<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Écosystème en maintenance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0e14; --card:#11151d; --border:rgba(255,255,255,.08);
  --accent:#6D5DFC; --text:#f4f5f7; --text-dim:#8b91a3;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.card{
  max-width:420px;width:100%;
  text-align:center;
}
.logo{
  display:inline-flex;align-items:center;gap:10px;
  margin-bottom:40px;
}
.logo-mark{
  width:34px;height:34px;border-radius:9px;
  display:block;
}
.logo-name{font-weight:700;font-size:17px;letter-spacing:-.01em}
.icon{
  width:64px;height:64px;border-radius:18px;
  background:rgba(109,93,252,.12);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 28px;
  color:var(--accent);
}
h1{font-size:21px;font-weight:700;margin-bottom:10px;letter-spacing:-.01em}
p{font-size:14.5px;color:var(--text-dim);line-height:1.6;margin-bottom:32px}
.dot-row{display:flex;align-items:center;justify-content:center;gap:8px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:.04em}
.dot{width:6px;height:6px;border-radius:50%;background:#f59e0b;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg class="logo-mark" width="34" height="34" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="22" fill="#6D5DFC"/>
        <rect x="18" y="18" width="16" height="56" rx="4" fill="rgba(210,205,255,0.92)"/>
        <rect x="18" y="58" width="46" height="16" rx="4" fill="rgba(210,205,255,0.92)"/>
        <rect x="48" y="18" width="34" height="34" rx="7" fill="rgba(210,205,255,0.75)"/>
        <path d="M65 26 L66.5 31.5 L72 33 L66.5 34.5 L65 40 L63.5 34.5 L58 33 L63.5 31.5 Z" fill="#6D5DFC" opacity="0.9"/>
      </svg>
      <div class="logo-name" style="color:var(--accent)">Loksite</div>
    </div>
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    </div>
    <h1>Écosystème en maintenance</h1>
    <p>Cette page est temporairement indisponible. Nous mettons à jour votre écosystème — il sera de nouveau en ligne dans quelques instants.</p>
    <div class="dot-row"><span class="dot"></span> MAINTENANCE EN COURS</div>
  </div>
</body>
</html>
